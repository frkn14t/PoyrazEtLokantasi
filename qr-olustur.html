<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poyraz Et Lokantası - QR Kod Oluşturucu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Nunito', sans-serif;
            background: #1a1210;
            color: #f0e6dc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #f5efe8;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #a89888;
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .qr-card {
            background: #2a2018;
            border: 1px solid #3a2e24;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #c8956c;
            margin-bottom: 8px;
            text-align: left;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            background: #1a1210;
            border: 1px solid #3a2e24;
            border-radius: 10px;
            color: #f0e6dc;
            font-family: 'Nunito', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #c8956c;
        }

        .input-group input::placeholder {
            color: #5a4a3a;
        }

        .generate-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #c8956c, #d4a853);
            color: #1a1210;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(200,149,108,0.3);
        }

        .qr-output {
            margin-top: 32px;
            padding: 24px;
            background: white;
            border-radius: 16px;
            display: none;
        }

        .qr-output.visible {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .qr-output img {
            max-width: 100%;
            height: auto;
        }

        .download-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 24px;
            background: #1a1210;
            color: #c8956c;
            border: 1px solid #c8956c;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: #c8956c;
            color: #1a1210;
        }

        .note {
            margin-top: 24px;
            font-size: 0.8rem;
            color: #7a6a5a;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 QR Kod Oluşturucu</h1>
        <p class="subtitle">Menü sayfanız için QR kod oluşturun</p>

        <div class="qr-card">
            <div class="input-group">
                <label>Menü URL'si</label>
                <input type="url" id="urlInput" placeholder="https://sizin-site.com/menu" value="https://frkn14t.github.io/PoyrazEtLokantasi/">
            </div>
            <button class="generate-btn" onclick="generateQR()">QR Kod Oluştur</button>

            <div class="qr-output" id="qrOutput">
                <div id="qrImage"></div>
                <a class="download-btn" id="downloadBtn" download="poyraz-qr-kod.png">📥 QR Kodu İndir</a>
            </div>
        </div>

        <p class="note">
            * Menü sayfanızı bir hosting servisine (örn: Netlify, Vercel, GitHub Pages) 
            yükledikten sonra URL'yi buraya girerek QR kod oluşturabilirsiniz.<br>
            * QR kodu bastırarak masalara yerleştirebilirsiniz.
        </p>
    </div>

    <!-- QR Code library -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <script>
        function generateQR() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                alert('Lütfen bir URL girin!');
                return;
            }

            const output = document.getElementById('qrOutput');
            const qrImage = document.getElementById('qrImage');
            const downloadBtn = document.getElementById('downloadBtn');

            // Clear previous
            qrImage.innerHTML = '';

            // Generate QR
            const canvas = document.createElement('canvas');
            QRCode.toCanvas(canvas, url, {
                width: 300,
                margin: 2,
                color: {
                    dark: '#1a1210',
                    light: '#ffffff'
                }
            }, function(error) {
                if (error) {
                    console.error(error);
                    alert('QR kod oluşturulurken hata oluştu!');
                    return;
                }
                
                qrImage.appendChild(canvas);
                downloadBtn.href = canvas.toDataURL('image/png');
                output.classList.add('visible');
            });
        }
    </script>
</body>
</html>
