<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poyraz Et Lokantası - QR Kod</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Playfair+Display:wght@600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #1a1210;
            color: #f0e6dc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .container { max-width: 500px; width: 100%; text-align: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #f5efe8; margin-bottom: 8px; }
        .subtitle { color: #a89888; font-size: 0.9rem; margin-bottom: 32px; }
        .qr-card {
            background: #2a2018;
            border: 1px solid #3a2e24;
            border-radius: 20px;
            padding: 40px;
        }
        .qr-wrapper {
            background: white;
            border-radius: 16px;
            padding: 24px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .qr-wrapper img { display: block; max-width: 100%; height: auto; }
        .url-label { font-size: 0.8rem; color: #a89888; margin-bottom: 16px; word-break: break-all; }
        .download-btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #c8956c, #d4a853);
            color: #1a1210;
            border: none;
            border-radius: 12px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
        }
        .download-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(200,149,108,0.3); }
        .note { margin-top: 24px; font-size: 0.78rem; color: #7a6a5a; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 Poyraz Et Lokantası</h1>
        <p class="subtitle">Menü QR Kodu</p>

        <div class="qr-card">
            <div class="qr-wrapper">
                <img 
                    src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://frkn14t.github.io/PoyrazEtLokantasi/" 
                    alt="Menü QR Kodu"
                    width="300" height="300"
                >
            </div>
            <p class="url-label">https://frkn14t.github.io/PoyrazEtLokantasi/</p>
            <a 
                class="download-btn" 
                href="https://api.qrserver.com/v1/create-qr-code/?size=600x600&format=png&data=https://frkn14t.github.io/PoyrazEtLokantasi/" 
                download="poyraz-qr-kod.png"
            >
                📥 QR Kodu İndir
            </a>
        </div>

        <p class="note">* QR kodu bastırarak masalara yerleştirebilirsiniz.</p>
    </div>
</body>
</html>
